<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCI Prediction - 단백질-화합물 상호작용 예측 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center mr-3">
                            <i class="fas fa-flask text-white text-xl"></i>
                        </div>
                        <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PCI Prediction</h1>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-600">
                        <i class="fas fa-circle text-green-500 animate-pulse mr-1"></i>
                        시스템 정상
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 헤더 -->
        <div class="text-center mb-8 fade-in">
            <div class="inline-block p-4 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4">
                <i class="fas fa-dna text-white text-5xl"></i>
            </div>
            <h2 class="text-4xl font-bold text-white mb-4">
                단백질-화합물 상호작용 예측 시스템
            </h2>
            <p class="text-xl text-white opacity-90 max-w-2xl mx-auto">
                체크박스로 실행 단계를 선택하고 한번에 워크플로우를 실행하세요
            </p>
        </div>

        <!-- 통합 워크플로우 카드 -->
        <div class="card fade-in">
            
            <!-- 단계 선택 -->
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-tasks text-indigo-600"></i>
                    실행할 단계 선택
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Step 1: 데이터 수집 -->
                    <div class="workflow-checkbox" id="step1-card">
                        <input type="checkbox" id="step1" class="step-checkbox">
                        <label for="step1" class="step-label">
                            <div class="step-number">1</div>
                            <div class="step-icon">
                                <i class="fas fa-download text-indigo-600"></i>
                            </div>
                            <div class="step-content">
                                <h4 class="font-bold text-gray-800">데이터 수집</h4>
                                <p class="text-sm text-gray-500">ChEMBL/BindingDB</p>
                            </div>
                            <div class="step-status" id="status1">
                                <i class="fas fa-circle text-gray-300"></i>
                            </div>
                        </label>
                    </div>

                    <!-- Step 2: 특성 변환 -->
                    <div class="workflow-checkbox" id="step2-card">
                        <input type="checkbox" id="step2" class="step-checkbox">
                        <label for="step2" class="step-label">
                            <div class="step-number">2</div>
                            <div class="step-icon">
                                <i class="fas fa-cogs text-purple-600"></i>
                            </div>
                            <div class="step-content">
                                <h4 class="font-bold text-gray-800">특성 변환</h4>
                                <p class="text-sm text-gray-500">Fingerprint + Descriptor</p>
                            </div>
                            <div class="step-status" id="status2">
                                <i class="fas fa-circle text-gray-300"></i>
                            </div>
                        </label>
                    </div>

                    <!-- Step 3: 모델 학습 -->
                    <div class="workflow-checkbox" id="step3-card">
                        <input type="checkbox" id="step3" class="step-checkbox">
                        <label for="step3" class="step-label">
                            <div class="step-number">3</div>
                            <div class="step-icon">
                                <i class="fas fa-brain text-blue-600"></i>
                            </div>
                            <div class="step-content">
                                <h4 class="font-bold text-gray-800">모델 학습</h4>
                                <p class="text-sm text-gray-500">XGBoost/LightGBM/etc</p>
                            </div>
                            <div class="step-status" id="status3">
                                <i class="fas fa-circle text-gray-300"></i>
                            </div>
                        </label>
                    </div>

                    <!-- Step 4: 예측 -->
                    <div class="workflow-checkbox" id="step4-card">
                        <input type="checkbox" id="step4" class="step-checkbox">
                        <label for="step4" class="step-label">
                            <div class="step-number">4</div>
                            <div class="step-icon">
                                <i class="fas fa-chart-line text-green-600"></i>
                            </div>
                            <div class="step-content">
                                <h4 class="font-bold text-gray-800">예측</h4>
                                <p class="text-sm text-gray-500">활성/비활성 분류</p>
                            </div>
                            <div class="step-status" id="status4">
                                <i class="fas fa-circle text-gray-300"></i>
                            </div>
                        </label>
                    </div>

                    <!-- Step 5: SHAP 분석 -->
                    <div class="workflow-checkbox" id="step5-card">
                        <input type="checkbox" id="step5" class="step-checkbox">
                        <label for="step5" class="step-label">
                            <div class="step-number">5</div>
                            <div class="step-icon">
                                <i class="fas fa-lightbulb text-orange-600"></i>
                            </div>
                            <div class="step-content">
                                <h4 class="font-bold text-gray-800">SHAP 분석</h4>
                                <p class="text-sm text-gray-500">특성 중요도</p>
                            </div>
                            <div class="step-status" id="status5">
                                <i class="fas fa-circle text-gray-300"></i>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <hr class="my-8 border-gray-200">

            <!-- 설정 입력 폼 -->
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-sliders-h text-indigo-600"></i>
                    워크플로우 설정
                </h3>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    
                    <!-- 왼쪽 컬럼 -->
                    <div class="space-y-4">
                        <!-- 단백질 이름 -->
                        <div class="form-group">
                            <label class="form-label">단백질 이름 (필수)</label>
                            <input type="text" id="protein-name" class="form-input" placeholder="예: FTO, PDE4, PDE5">
                            <p class="text-xs text-gray-500 mt-1">Step 1, 2, 3에서 사용</p>
                        </div>

                        <!-- 타겟 유전자 리스트 -->
                        <div class="form-group" id="target-group">
                            <label class="form-label">타겟 유전자 리스트 (Step 1용)</label>
                            <input type="text" id="target-genes" class="form-input" placeholder="예: PDE4, PDE5, HDAC1">
                            <p class="text-xs text-gray-500 mt-1">쉼표로 구분, Step 1 선택 시 필수</p>
                        </div>

                        <!-- Fingerprint 타입 -->
                        <div class="form-group">
                            <label class="form-label">Fingerprint 타입</label>
                            <select id="fingerprint-type" class="form-input">
                                <option value="MACCS">MACCS (167비트 - 권장)</option>
                                <option value="ECFP4">ECFP4 (1024비트)</option>
                                <option value="MORGAN">MORGAN (1024비트)</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Step 2에서 사용</p>
                        </div>

                        <!-- 데이터셋 비율 -->
                        <div class="form-group">
                            <label class="form-label">데이터셋 비율</label>
                            <select id="dataset-ratio" class="form-input">
                                <option value="5x">5x (활성:비활성 = 1:5)</option>
                                <option value="10x">10x (활성:비활성 = 1:10)</option>
                                <option value="20x" selected>20x (활성:비활성 = 1:20)</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Step 2에서 사용</p>
                        </div>

                        <!-- Descriptor 차원 -->
                        <div class="form-group">
                            <label class="form-label">Descriptor 차원</label>
                            <select id="ignore3d" class="form-input">
                                <option value="true" selected>2D만 사용 (빠름)</option>
                                <option value="false">3D 포함 (느림)</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Step 2에서 사용</p>
                        </div>
                    </div>

                    <!-- 오른쪽 컬럼 -->
                    <div class="space-y-4">
                        <!-- 임계값 -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label">활성 임계값 (nM)</label>
                                <input type="number" id="pos-threshold" class="form-input" value="10000">
                            </div>
                            <div class="form-group">
                                <label class="form-label">비활성 임계값 (nM)</label>
                                <input type="number" id="neg-threshold" class="form-input" value="20000">
                            </div>
                        </div>

                        <!-- 모델 타입 -->
                        <div class="form-group" id="model-group">
                            <label class="form-label">모델 타입 (Step 3용)</label>
                            <select id="model-type" class="form-input">
                                <option value="XGBoost" selected>XGBoost (권장)</option>
                                <option value="LightGBM">LightGBM</option>
                                <option value="CatBoost">CatBoost</option>
                                <option value="RandomForest">RandomForest</option>
                                <option value="TabPFN">TabPFN (소수 데이터용)</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Step 3 선택 시 필수</p>
                        </div>

                        <!-- SMILES 입력 -->
                        <div class="form-group" id="smiles-group">
                            <label class="form-label">SMILES 리스트 (Step 4용)</label>
                            <textarea id="smiles-input" class="form-input" rows="3" placeholder="예: CCO&#10;CC(=O)O&#10;c1ccccc1"></textarea>
                            <p class="text-xs text-gray-500 mt-1">한 줄에 하나씩, Step 4 선택 시 필수</p>
                        </div>

                        <!-- 모델 선택 (예측용) -->
                        <div class="form-group" id="model-select-group">
                            <label class="form-label">사용할 모델 (Step 4, 5용)</label>
                            <select id="model-select" class="form-input">
                                <option value="">모델을 먼저 학습해주세요</option>
                            </select>
                            <button onclick="loadModelList()" class="btn btn-secondary mt-2">
                                <i class="fas fa-sync-alt mr-2"></i>모델 목록 새로고침
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 실행 버튼 -->
            <div class="text-center">
                <button onclick="executeWorkflow()" class="btn btn-primary text-lg px-8 py-4">
                    <i class="fas fa-play mr-2"></i>
                    선택한 단계 실행
                </button>
            </div>

            <hr class="my-8 border-gray-200">

            <!-- 진행 상황 -->
            <div id="progress-section" class="hidden">
                <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-tasks text-indigo-600"></i>
                    실행 진행 상황
                </h3>
                <div id="progress-container" class="space-y-3">
                    <!-- 동적으로 생성됨 -->
                </div>
            </div>

            <!-- 결과 표시 -->
            <div id="results-section" class="hidden mt-8">
                <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-chart-bar text-indigo-600"></i>
                    실행 결과
                </h3>
                <div id="results-container" class="space-y-4">
                    <!-- 동적으로 생성됨 -->
                </div>
            </div>

        </div>
    </div>

    <script src="/static/js/workflow.js"></script>
</body>
</html>
